  <h1>GWFD-010224 N4 接口特性概述</h1>
  <p>来源依据：cloud_core_coldstart_md/01_features/gwfd_010224_n4.md</p>
  <p>N4 接口用于 5GC 控制面 SMF 与用户面 UPF 之间进行会话控制、转发规则下发和状态上报。</p>
  <p>N4 接口基于 PFCP 协议，承载会话建立、修改、删除、心跳检测以及用户面能力协商等控制信息。</p>
  <table>
    <thead>
      <tr><th>涉及 NF</th><th>支持版本</th><th>功能说明</th></tr>
    </thead>
    <tbody>
      <tr><td>SMF</td><td>20.0.0 及后续版本</td><td>负责 N4 邻接管理、PFCP 会话控制和策略下发。</td></tr>
      <tr><td>UPF</td><td>20.0.0 及后续版本</td><td>负责接收 PFCP 规则、建立用户面转发表并上报状态。</td></tr>
    </tbody>
  </table>
</body>
