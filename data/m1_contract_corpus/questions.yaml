# User questions derived from data/m1_contract_corpus/corpus.
# These are user-facing questions, not Mining metadata.

questions:
  - id: Q-M1-001
    question: "ADD APN 命令怎么写？"
    intent: command_usage
    expected_objects: ["ADD APN", "APN"]
    expected_roles: ["concept", "parameter", "example", "note"]
    expected_behavior: "命中 ADD APN canonical；返回命令功能、关键参数、示例和注意事项。"

  - id: Q-M1-002
    question: "ADD APN 的 APNNAME 是不是必填？"
    intent: command_parameter
    expected_objects: ["ADD APN", "APNNAME"]
    expected_roles: ["parameter"]
    expected_behavior: "返回 APNNAME 为必选参数，并提供来源下钻。"

  - id: Q-M1-003
    question: "ADD APN 的 POOLNAME 参数是必选还是可选？"
    intent: conflict_check
    expected_objects: ["ADD APN", "POOLNAME"]
    expected_roles: ["parameter"]
    expected_behavior: "识别同一 scope 下存在冲突候选，不应强行给出唯一结论。"
    fixture_note: "当前预构建 DB 受限于 Mining 仍缺少文件级 scope/conflict 识别，可能尚未产生 conflict_candidate；Serving 应按目标契约保留 conflicts 输出能力。"

  - id: Q-M1-004
    question: "V100R023C20 的 ADD APN 和 V100R023C10 有什么差异？"
    intent: variant_compare
    expected_objects: ["ADD APN", "V100R023C20", "V100R023C10"]
    expected_roles: ["parameter", "note"]
    expected_behavior: "通过 scope_variant 下钻，说明版本维度差异。"
    fixture_note: "当前预构建 DB 受限于 Mining 仍缺少文件级 scope 继承，可能尚未产生 scope_variant；Serving 应按目标契约保留 variants/gaps 输出能力。"

  - id: Q-M1-005
    question: "新增 ims APN 的配置示例是什么？"
    intent: command_example
    expected_objects: ["ADD APN", "ims"]
    expected_roles: ["example"]
    expected_behavior: "返回包含 ims 和 IPV4V6 的 ADD APN 示例。"

  - id: Q-M1-006
    question: "新增 APN 前需要注意什么？"
    intent: command_note
    expected_objects: ["ADD APN"]
    expected_roles: ["note", "constraint"]
    expected_behavior: "返回签约、地址池、Sxb 或 DNS 相关注意事项。"

  - id: Q-M1-007
    question: "DNN 本地分流是什么？"
    intent: concept_lookup
    expected_objects: ["DNN", "UPF", "SMF"]
    expected_roles: ["concept"]
    expected_behavior: "命中 TXT 概念语料，解释本地分流和适用场景。"

  - id: Q-M1-008
    question: "DNN 本地分流启用前有什么限制？"
    intent: constraint_lookup
    expected_objects: ["DNN", "本地分流"]
    expected_roles: ["constraint"]
    expected_behavior: "返回本地 DN 可达、路由返回、安全策略一致等限制。"

  - id: Q-M1-009
    question: "SMF 到 UPF 的 N4 互通配置前要检查什么？"
    intent: checklist_lookup
    expected_objects: ["SMF", "UPF", "N4", "PFCP"]
    expected_roles: ["checklist", "procedure_step"]
    expected_behavior: "返回 N4 承载地址、PFCP 端口、版本兼容、PeerIP/LocalIP 等检查项。"

  - id: Q-M1-010
    question: "ADD N4PEER 之前需要确认哪些前置条件？"
    intent: procedure_precondition
    expected_objects: ["ADD N4PEER", "N4", "PFCP"]
    expected_roles: ["checklist", "constraint"]
    expected_behavior: "从 N4 检查清单和互通流程中召回前置条件。"

  - id: Q-M1-011
    question: "N4 Association 建立失败怎么排查？"
    intent: troubleshooting
    expected_objects: ["N4", "Association", "PFCP"]
    expected_roles: ["troubleshooting_step"]
    expected_behavior: "命中 TXT 排障语料，返回连通性、对端配置、PFCP 报文、进程日志和版本互通检查。"

  - id: Q-M1-012
    question: "PFCP Peer Down 告警可能影响什么业务？"
    intent: alarm_impact
    expected_objects: ["ALM-PFCP-PEER-DOWN", "PFCP", "N4 Peer"]
    expected_roles: ["alarm"]
    expected_behavior: "PDF/DOCX 在 M1 只登记不切片，因此该问题在 M1 可能只能通过已解析的 N4 排障语料部分回答，并应暴露未解析来源存在。"

  - id: Q-M1-013
    question: "N4 接口的作用是什么？"
    intent: concept_lookup
    expected_objects: ["N4", "SMF", "UPF", "PFCP"]
    expected_roles: ["concept"]
    expected_behavior: "HTML 在 M1 只登记不切片；若没有其他解析来源，应提示可用语料不足或仅返回相关来源。"

  - id: Q-M1-014
    question: "哪些文件没有被 M1 解析成切片？"
    intent: source_audit
    expected_objects: ["html", "pdf", "docx"]
    expected_roles: []
    expected_behavior: "通过 raw_documents 展示 HTML/PDF/DOCX 已登记但未生成 raw_segments。"

  - id: Q-M1-015
    question: "这个语料库里有哪些关于 APN 的重复或近似重复来源？"
    intent: source_mapping_audit
    expected_objects: ["ADD APN", "APN"]
    expected_roles: []
    expected_behavior: "通过 L2 显示 primary、exact_duplicate、normalized_duplicate、scope_variant 和 conflict_candidate。"
    fixture_note: "当前预构建 DB 已可验证 primary、exact_duplicate、near_duplicate；normalized_duplicate、scope_variant、conflict_candidate 取决于 Mining 后续归并增强。"

  - id: Q-M1-016
    question: "ADD APN 的参数表有哪些列，每行参数分别是什么？"
    intent: structured_evidence_lookup
    expected_objects: ["ADD APN", "参数说明"]
    expected_roles: ["parameter"]
    expected_behavior: "返回 table 类型 evidence，并保留 structure_json 中的 columns/rows，不能只返回扁平文本。"

  - id: Q-M1-017
    question: "ADD APN 参数说明来自哪个文件、哪个章节？"
    intent: source_drilldown
    expected_objects: ["ADD APN", "参数说明"]
    expected_roles: ["parameter"]
    expected_behavior: "返回 raw_document.relative_path、section_path/section_title 和 source_offsets_json，支持下钻到原始来源。"
