questions:
  - id: Q-REAL-001
    question: "网络切片在 5G 系统里解决什么问题？"
    intent: concept_lookup
    expected_objects: ["网络切片", "5G", "S-NSSAI"]
    expected_roles: ["concept", "note"]
    expected_sources: ["SRC-3GPP-5GS-OVERVIEW"]
    expected_behavior: "召回 network slicing 概念、业务隔离和按场景定制 PLMN 能力。"

  - id: Q-REAL-002
    question: "SMF、UPF、PCF 分别负责什么？"
    intent: term_lookup
    expected_objects: ["SMF", "UPF", "PCF"]
    expected_roles: ["concept"]
    expected_sources: ["SRC-3GPP-5GS-OVERVIEW", "SRC-FREE5GC-UPF-DESIGN"]
    expected_behavior: "返回三个 NF 的定义和关系，避免把控制面与用户面职责混淆。"

  - id: Q-REAL-003
    question: "N4 接口是什么协议，连接哪些网元？"
    intent: concept_lookup
    expected_objects: ["N4", "PFCP", "SMF", "UPF"]
    expected_roles: ["concept"]
    expected_sources: ["SRC-FREE5GC-UPF-DESIGN", "SRC-FREE5GC-SMF-PFCP", "SRC-3GPP-29244"]
    expected_behavior: "说明 N4 位于 SMF 与 UPF 之间，使用 PFCP 承载控制信息。"

  - id: Q-REAL-004
    question: "Open5GS 里让 UE 能访问外网需要执行哪些 Linux 命令？"
    intent: command_usage
    expected_objects: ["Open5GS", "UE", "iptables", "sysctl", "ogstun"]
    expected_roles: ["example", "procedure_step", "parameter"]
    expected_sources: ["SRC-OPEN5GS-QUICKSTART"]
    expected_behavior: "返回开启 IPv4/IPv6 forwarding、添加 NAT 规则、检查防火墙的命令。"

  - id: Q-REAL-005
    question: "free5GC 的 registerIPv4 和 bindingIPv4 有什么区别？"
    intent: parameter_explain
    expected_objects: ["free5GC", "registerIPv4", "bindingIPv4", "NRF"]
    expected_roles: ["parameter", "note"]
    expected_sources: ["SRC-FREE5GC-CONFIG"]
    expected_behavior: "解释注册到 NRF 的地址和服务绑定地址可能不同，Kubernetes 等场景需要区分。"

  - id: Q-REAL-006
    question: "SMF 配置 S-NSSAI 时需要关注哪些对象？"
    intent: deployment_guidance
    expected_objects: ["SMF", "S-NSSAI", "DNN", "UPF", "UE routing"]
    expected_roles: ["procedure_step", "parameter", "checklist"]
    expected_sources: ["SRC-FREE5GC-CONFIG"]
    expected_behavior: "召回 SMF S-NSSAI 配置、UE routing、UPF 数据路径相关说明。"

  - id: Q-REAL-007
    question: "本地分流方案为什么依赖 SMF 和 UPF 的协同？"
    intent: solution_explain
    expected_objects: ["本地分流", "SMF", "UPF", "N4", "N6"]
    expected_roles: ["concept", "procedure_step", "note"]
    expected_sources: ["SRC-3GPP-5GS-OVERVIEW", "SRC-FREE5GC-UPF-DESIGN", "SRC-FREE5GC-CONFIG"]
    expected_behavior: "说明 SMF 选择路径并控制 UPF，UPF 执行 N3/N6/N9 转发。"

  - id: Q-REAL-008
    question: "N4 Association 建立失败时应该先查什么？"
    intent: troubleshooting
    expected_objects: ["N4", "Association", "PFCP", "SMF", "UPF"]
    expected_roles: ["troubleshooting_step", "checklist"]
    expected_sources: ["SRC-FREE5GC-SMF-PFCP", "SRC-FREE5GC-UPF-DESIGN"]
    expected_behavior: "返回 UDP/PFCP 监听、SMF-UPF 地址、心跳、UPF 进程和路由检查顺序。"

  - id: Q-REAL-009
    question: "哪些真实来源支撑了这个数据集？"
    intent: source_audit
    expected_objects: ["SRC-3GPP-5GS-OVERVIEW", "SRC-FREE5GC-CONFIG", "SRC-OPEN5GS-QUICKSTART"]
    expected_roles: []
    expected_sources:
      - "SRC-3GPP-5GS-OVERVIEW"
      - "SRC-FREE5GC-CONFIG"
      - "SRC-OPEN5GS-QUICKSTART"
    expected_behavior: "能够从 raw document 内容中展示来源 ID/URL；source_registry.yaml 不在 Mining input root 中，不能作为 Serving 强依赖。"

  - id: Q-REAL-010
    question: "哪些文件在 M1 只应该登记，不应该切片？"
    intent: source_audit
    expected_objects: ["html", "pdf", "docx"]
    expected_roles: []
    expected_sources: []
    expected_behavior: "列出 HTML、PDF、DOCX 样本，并说明 M1 不解析这些格式。"

  - id: Q-REAL-011
    question: "free5GC SMF S-NSSAI 配置表里有哪些参数？"
    intent: structured_evidence_lookup
    expected_objects: ["free5GC", "SMF", "S-NSSAI", "registerIPv4", "bindingIPv4"]
    expected_roles: ["parameter"]
    expected_sources: ["SRC-FREE5GC-CONFIG"]
    expected_behavior: "返回 table 类型 evidence，并保留 structure_json 的 columns/rows。"

  - id: Q-REAL-012
    question: "回答 Open5GS UE 外网连通命令时，能下钻到哪个文件和章节？"
    intent: source_drilldown
    expected_objects: ["Open5GS", "UE", "外网连通", "命令格式"]
    expected_roles: ["example", "procedure_step"]
    expected_sources: ["SRC-OPEN5GS-QUICKSTART"]
    expected_behavior: "返回 relative_path、section_path/section_title 和 source_offsets_json，支持下钻。"
