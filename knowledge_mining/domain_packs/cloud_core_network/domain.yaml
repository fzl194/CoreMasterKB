# ---------------------------------------------------------------------------
# Serving configuration
# ---------------------------------------------------------------------------

serving:
  # Query understanding configuration (moved from hardcoded defaults)
  query_understanding:
    command_regex: "(ADD|MOD|DEL|SET|SHOW|LST|DSP|REG|DEREG)\\s+([A-Z][A-Z0-9_]*)"
    op_map:
      "\u65b0\u589e": ADD
      "\u6dfb\u52a0": ADD
      "\u521b\u5efa": ADD
      "\u4fee\u6539": MOD
      "\u66f4\u6539": MOD
      "\u7f16\u8f91": MOD
      "\u5220\u9664": DEL
      "\u79fb\u9664": DEL
      "\u67e5\u8be2": SHOW
      "\u67e5\u770b": DSP
      "\u663e\u793a": LST
      "\u8bbe\u7f6e": SET
      "\u914d\u7f6e": SET
    network_elements:
      - AMF
      - SMF
      - UPF
      - UDM
      - PCF
      - NRF
      - AUSF
      - BSF
      - NSSF
      - SCP
      - UDSF
      - UDR
    products:
      - UDG
      - UNC
      - CloudCore
  route_policy:
    default:
      lexical_bm25: {weight: 1.0, top_k: 50}
      entity_exact: {weight: 1.0, top_k: 30}
      dense_vector: {weight: 0.8, top_k: 50}
    command_usage:
      entity_exact: {weight: 1.4, top_k: 20}
      lexical_bm25: {weight: 1.0, top_k: 50}
      dense_vector: {weight: 0.5, top_k: 30}
    concept_lookup:
      dense_vector: {weight: 1.2, top_k: 50}
      lexical_bm25: {weight: 1.0, top_k: 50}
      entity_exact: {weight: 0.6, top_k: 20}
    troubleshooting:
      lexical_bm25: {weight: 1.0, top_k: 50}
      entity_exact: {weight: 1.2, top_k: 30}
      dense_vector: {weight: 0.6, top_k: 30}
    comparison:
      lexical_bm25: {weight: 1.0, top_k: 50}
      dense_vector: {weight: 1.0, top_k: 50}
      entity_exact: {weight: 1.0, top_k: 30}
