# Cloud Core Network Domain Pack
# Migrated from hardcoded values in extractors.py, llm_templates.py, enrich/__init__.py, models.py

domain_id: cloud_core_network
display_name: "Cloud Core Network (5GC/UDG)"

# ---------------------------------------------------------------------------
# Entity configuration
# ---------------------------------------------------------------------------

entity_types:
  - command
  - network_element
  - parameter
  - protocol
  - interface
  - alarm
  - feature
  - concept

strong_entity_types:
  - command
  - network_element
  - parameter
  - protocol
  - interface
  - alarm
  - feature

# ---------------------------------------------------------------------------
# Semantic role mapping: section title keywords -> core semantic_role
# ---------------------------------------------------------------------------

role_keyword_rules:
  - keywords: ["参数", "参数说明", "参数标识"]
    role: parameter
  - keywords: ["使用实例", "命令格式", "示例", "配置示例"]
    role: example
  - keywords: ["操作步骤", "流程", "检查项", "前置检查", "checklist"]
    role: procedure_step
  - keywords: ["排障", "故障", "troubleshoot"]
    role: troubleshooting_step
  - keywords: ["注意事项", "限制", "约束", "constraint"]
    role: constraint
  - keywords: ["概述", "简介"]
    role: concept

# ---------------------------------------------------------------------------
# Heading role classification: heading keywords -> heading role
# ---------------------------------------------------------------------------

heading_role_keywords:
  - keywords: ["参数", "参数说明", "参数标识"]
    role: parameter_definition
  - keywords: ["使用实例", "示例", "配置示例"]
    role: example_section
  - keywords: ["操作步骤", "流程", "检查项"]
    role: procedure_section
  - keywords: ["排障", "故障"]
    role: troubleshooting_section
  - keywords: ["注意事项", "限制", "约束"]
    role: constraint_section
  - keywords: ["概述", "简介", "功能"]
    role: overview_section

# ---------------------------------------------------------------------------
# Rule-based extractors (regex)
# ---------------------------------------------------------------------------

extractor_rules:
  - name: network_function
    pattern: "\\b(SMF|UPF|AMF|PCF|UDM|UDR|AUSF|NRF|NSSF|BSF|CHF|SMSF|LMF|GMLC|NEF|SCF)\\b"
    entity_type: network_element

  - name: command
    pattern: "\\b(ADD|SHOW|MOD|DEL|DSP|LST|REG|DEREG|SET|GET|CFG|ACT|DEACT|CLR|PRT)\\s+([A-Z][A-Z0-9_]{1,20})"
    entity_type: command
    groups:
      - index: 0
        format: "{group1} {group2}"

  - name: interface
    pattern: "(?<![A-Za-z0-9_])(N[1-9]\\d?|N1[0-9]\\d?|N2[0-8]|Sx[abc]|S1[ -](?:MME|U)|S6a|S11|Gx)(?![A-Za-z0-9_])"
    entity_type: interface

  - name: alarm
    pattern: "(?<![A-Za-z0-9_])(ALM-[A-Z][A-Z0-9_-]{2,40})(?![A-Za-z0-9_-])"
    entity_type: alarm

# ---------------------------------------------------------------------------
# Table parameter column names (used by entity extractor for table segments)
# ---------------------------------------------------------------------------

# These are handled in code as structural extraction, not regex.
# The RuleBasedEntityExtractor reads table structure["columns"] and
# extracts parameter names from columns matching these names.
parameter_column_names:
  - "参数标识"
  - "参数名称"
  - "参数名"

# ---------------------------------------------------------------------------
# Section-title command pattern (used by _add_section_context_entities)
# ---------------------------------------------------------------------------

section_title_command_pattern: "^(ADD|SHOW|MOD|DEL|DSP|LST|REG|DEREG)\\s+(\\S+)"

# ---------------------------------------------------------------------------
# Retrieval policy
# ---------------------------------------------------------------------------

retrieval_policy:
  raw_text: primary
  generated_question: auxiliary
  entity_card: strong_entities_only
  table_row: structured_tables
  max_questions_per_segment: 2
  max_entity_cards_per_segment: 3

# ---------------------------------------------------------------------------
# LLM templates
# ---------------------------------------------------------------------------

llm_templates:
  - template_key: mining-question-gen
    template_version: "3"
    purpose: "从段落内容生成假设性检索问题"
    system_prompt: "你是通信网络知识库的检索优化助手。你判断段落是否值得生成问题，如果是则生成高质量检索问题。"
    user_prompt_template: >
      分析以下技术文档段落：

      段落标题：$title
      段落内容：$content

      首先评估该段落是否包含值得生成问题的实质性知识：
      - 如果是目录、导航列表、纯链接/锚点列表：输出空数组 []
      - 如果是大量空值或占位符的稀疏表格：输出空数组 []
      - 如果内容过于简短或模糊，无法生成有意义的问题：输出空数组 []

      如果段落确实包含实质性知识，生成 1-2 个问题：
      - 问题必须能从该段落中找到明确答案
      - 问题应测试知识理解，而非导航（避免"在哪里找到X"、"文档有哪些章节"）
      - 避免生成高度相似或近义的问题

      输出 JSON 数组，每个元素包含 question 字段。无合适问题时输出空数组 []。
    expected_output_type: json_array
    output_schema_json: '{"type":"array","items":{"type":"object","properties":{"question":{"type":"string"}},"required":["question"],"additionalProperties":false}}'

  - template_key: mining-segment-understanding
    template_version: "3"
    purpose: "从段落提取实体、分类语义角色、评估内容质量"
    system_prompt: "你是通信网络知识库的内容理解助手。分析技术文档段落，提取关键实体、分类语义角色，并评估内容质量。"
    user_prompt_template: >
      分析以下技术文档段落：

      段落标题：$section_title
      内容类型：$block_type
      段落内容：$text

      输出 JSON 对象，包含：
      - entities: 实体列表，每个元素包含 type 和 name
        type 可选值：command / network_element / parameter / protocol / interface / alarm / feature / concept

      质量指引：
      - 只提取文档中明确出现、有专有名称的技术实体
      - 接口（如N4、Sxb）和协议（如PFCP、HTTP）是不同类型：接口是3GPP定义的参考点，协议是通信规范
      - 告警ID（如ALM-XXX-XXX）归为alarm类型
      - 产品特性编码（如GWFD-XXXXXX）和子特性（如SA-HTTP Pipeline）归为feature类型
      - 如果无法确定实体类型，不要强行分类

      - semantic_role: 语义角色（concept/parameter/example/note/procedure_step/troubleshooting_step/constraint/alarm/checklist/unknown）
      - document_type: 文档类型提示（command/feature/procedure/troubleshooting/alarm/constraint/checklist/reference/other）
      - content_assessment: 内容质量评估
        - is_substantive: 是否包含实质性知识内容（非纯导航、目录、链接列表）
        - is_navigation: 是否是导航/目录内容
        - assessment_reason: 一句话说明判断依据

      内容质量评估指引：
      - 如果段落只是锚点列表、目录索引、纯链接，is_substantive=false, is_navigation=true
      - 如果段落包含具体的技术描述、参数说明、操作步骤，is_substantive=true
      - 稀疏表格（大量空值或占位符"-"）视为非实质性内容
      - 纯标题无内容视为非实质性内容
    expected_output_type: json_object
    output_schema_json: '{"type":"object","properties":{"entities":{"type":"array","items":{"type":"object","properties":{"type":{"type":"string"},"name":{"type":"string"}},"required":["type","name"],"additionalProperties":false}},"semantic_role":{"type":"string"},"document_type":{"type":"string"},"content_assessment":{"type":"object","properties":{"is_substantive":{"type":"boolean"},"is_navigation":{"type":"boolean"},"assessment_reason":{"type":"string"}},"required":["is_substantive","is_navigation"],"additionalProperties":false}},"required":["entities","semantic_role","document_type","content_assessment"],"additionalProperties":false}'

  - template_key: mining-discourse-relation
    template_version: "1"
    purpose: "分析段落间的语篇关系（RST修辞结构理论）"
    system_prompt: "你是通信网络技术文档的语篇关系分析专家。分析给定段落列表中相邻段落之间的修辞关系。"
    user_prompt_template: >
      分析以下编号段落之间的语篇关系：

      $segments

      对每对相邻或同节段落，判断其修辞关系。可选关系类型：
      - ELABORATES: 后文详细阐述前文
      - EVIDENCES: 后文提供证据支持前文
      - CAUSES: 后文是前文的原因
      - RESULTS_IN: 后文是前文的结果
      - BACKGROUNDS: 后文提供背景信息
      - CONDITIONS: 后文说明前提条件
      - SUMMARIZES: 后文总结前文
      - JUSTIFIES: 后文解释前文的理由
      - ENABLES: 后文使前文的操作成为可能
      - CONTRASTS_WITH: 后文与前文对比
      - PARALLELS: 后文与前文并列
      - SEQUENCES: 后文是前文的后续步骤
      - UNRELATED: 无明显关系

      输出 JSON 数组，每个元素包含：
      - source: 源段落编号（整数）
      - target: 目标段落编号（整数）
      - relation: 关系类型（大写）
      - confidence: 置信度（0.0-1.0）

      只输出有明确关系的段落对，跳过 UNRELATED 的。
    expected_output_type: json_array
    output_schema_json: '{"type":"array","items":{"type":"object","properties":{"source":{"type":"integer"},"target":{"type":"integer"},"relation":{"type":"string"},"confidence":{"type":"number","minimum":0.0,"maximum":1.0}},"required":["source","target","relation","confidence"],"additionalProperties":false}}'

  - template_key: mining-contextual-retrieval
    template_version: "2"
    purpose: "为每个段落生成上下文描述，增强检索效果"
    system_prompt: "你是通信网络技术文档的检索上下文定位助手。"
    user_prompt_template: >
      文档全文：
      $document

      段落内容：
      $segment

      请生成一句 20-40 字的中文上下文标签，说明该段落在文档中的位置和主题。
      不要复述段落内容，只补充从段落文本中无法直接看出的上下文信息（如所属章节、讨论主题等）。
      输出 JSON 对象，包含 context 字段。
    expected_output_type: json_object
    output_schema_json: '{"type":"object","properties":{"context":{"type":"string"}},"required":["context"],"additionalProperties":false}'

# ---------------------------------------------------------------------------
