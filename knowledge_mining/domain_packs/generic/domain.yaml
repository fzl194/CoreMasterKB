# Generic Domain Pack
# Zero-configuration defaults for any technical documentation domain.
# No industry-specific entities, regex, or prompts.

domain_id: generic
display_name: "Generic Technical Documentation"

entity_types:
  - concept

strong_entity_types: []

role_keyword_rules:
  - keywords: ["parameter", "parameters", "参数"]
    role: parameter
  - keywords: ["example", "examples", "示例"]
    role: example
  - keywords: ["step", "steps", "procedure", "流程"]
    role: procedure_step
  - keywords: ["troubleshoot", "troubleshooting", "故障"]
    role: troubleshooting_step
  - keywords: ["constraint", "limitation", "限制"]
    role: constraint
  - keywords: ["overview", "introduction", "概述"]
    role: concept

heading_role_keywords:
  - keywords: ["parameter", "parameters"]
    role: parameter_definition
  - keywords: ["example", "examples"]
    role: example_section
  - keywords: ["step", "steps", "procedure"]
    role: procedure_section
  - keywords: ["troubleshoot", "troubleshooting"]
    role: troubleshooting_section
  - keywords: ["constraint", "limitation"]
    role: constraint_section
  - keywords: ["overview", "introduction"]
    role: overview_section

extractor_rules: []

parameter_column_names:
  - "parameter"
  - "Parameter"
  - "参数标识"
  - "参数名称"

section_title_command_pattern: ""

retrieval_policy:
  raw_text: primary
  generated_question: auxiliary
  entity_card: strong_entities_only
  table_row: structured_tables
  max_questions_per_segment: 2

llm_templates:
  - template_key: mining-question-gen
    template_version: "2"
    purpose: "Generate hypothetical retrieval questions from segment content"
    system_prompt: "You are a retrieval optimization assistant for technical documentation."
    user_prompt_template: >
      Based on the following technical documentation segment, generate 1-2 questions that a user might ask.

      Segment title: $title
      Segment content: $content

      Requirements:
      - Questions must be answerable from this segment
      - Avoid generating similar or synonymous questions
      - If the segment is too short, generate 0-1 questions

      Output a JSON array, each element containing a "question" field.
    expected_output_type: json_array
    output_schema_json: '{"type":"array","items":{"type":"object","properties":{"question":{"type":"string"}},"required":["question"],"additionalProperties":false}}'

  - template_key: mining-segment-understanding
    template_version: "2"
    purpose: "Extract entities and classify semantic role from segment"
    system_prompt: "You are a content understanding assistant for technical documentation. Analyze segments and extract key entities with semantic role classification."
    user_prompt_template: >
      Analyze the following technical documentation segment:

      Section title: $section_title
      Block type: $block_type
      Content: $text

      Output a JSON object with:
      - entities: list of entities, each with "type" and "name"
        type values: concept
      - semantic_role: one of concept/parameter/example/note/procedure_step/troubleshooting_step/constraint/alarm/checklist/unknown
      - document_type: one of command/feature/procedure/troubleshooting/alarm/constraint/checklist/reference/other

      Quality guidelines:
      - Only extract entities that are explicitly named in the text
      - If you cannot determine the entity type, do not force a classification
    expected_output_type: json_object
    output_schema_json: '{"type":"object","properties":{"entities":{"type":"array","items":{"type":"object","properties":{"type":{"type":"string"},"name":{"type":"string"}},"required":["type","name"],"additionalProperties":false}},"semantic_role":{"type":"string"},"document_type":{"type":"string"}},"required":["entities","semantic_role","document_type"],"additionalProperties":false}'

  - template_key: mining-discourse-relation
    template_version: "1"
    purpose: "Analyze discourse relations between segments (RST)"
    system_prompt: "You are a discourse relation analysis expert for technical documentation."
    user_prompt_template: >
      Analyze discourse relations between the following numbered segments:

      $segments

      For each pair of adjacent or co-section segments, determine their rhetorical relation. Available types:
      - ELABORATES: latter elaborates on former
      - EVIDENCES: latter provides evidence for former
      - CAUSES: latter is the cause of former
      - RESULTS_IN: latter is the result of former
      - BACKGROUNDS: latter provides background info
      - CONDITIONS: latter states prerequisites
      - SUMMARIZES: latter summarizes former
      - JUSTIFIES: latter explains the rationale for former
      - ENABLES: latter makes the former's action possible
      - CONTRASTS_WITH: latter contrasts with former
      - PARALLELS: latter parallels former
      - SEQUENCES: latter is the next step after former
      - UNRELATED: no clear relation

      Output a JSON array, each element with:
      - source: source segment number (integer)
      - target: target segment number (integer)
      - relation: relation type (UPPERCASE)
      - confidence: confidence (0.0-1.0)

      Only output segment pairs with clear relations, skip UNRELATED.
    expected_output_type: json_array
    output_schema_json: '{"type":"array","items":{"type":"object","properties":{"source":{"type":"integer"},"target":{"type":"integer"},"relation":{"type":"string"},"confidence":{"type":"number","minimum":0.0,"maximum":1.0}},"required":["source","target","relation","confidence"],"additionalProperties":false}}'

  - template_key: mining-contextual-retrieval
    template_version: "2"
    purpose: "Generate context description for each segment to enhance retrieval"
    system_prompt: "You are a retrieval context positioning assistant for technical documentation."
    user_prompt_template: >
      Full document:
      $document

      Segment content:
      $segment

      Generate a brief 10-30 word context label describing the segment's position and topic within the document.
      Do not restate the segment content; only provide context not directly visible from the segment text (e.g., section, topic).
      Output a JSON object with a "context" field.
    expected_output_type: json_object
    output_schema_json: '{"type":"object","properties":{"context":{"type":"string"}},"required":["context"],"additionalProperties":false}'

eval_questions: []
